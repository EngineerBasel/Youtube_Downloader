name: Build Mobile App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # السطر ده هيتخطى الخطأ لو الملف مش موجود أو اسمه غلط مؤقتاً
          pip install flet==0.23.2 yt-dlp

      - name: Build APK
        run: |
          # تثبيت flet كـ command line tool وتجربة البناء مباشرة
          pip install flet==0.23.2 yt-dlp
          flet build apk --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Downloader-APK
          path: build/apk/*.apk